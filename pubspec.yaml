name: jps_explorer
description: "Japan Search Explorer — 日本の文化資源をビジュアルに探索するアプリ"
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  http: ^1.3.0
  shared_preferences: ^2.3.4
  cached_network_image: ^3.4.1
  url_launcher: ^6.3.1
  geolocator: ^13.0.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  intl: any
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  flutter_local_notifications: ^18.0.1
  permission_handler: ^11.3.1
  image_picker: ^1.1.2
  in_app_purchase: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  remove_alpha_ios: true

flutter:
  generate: true
  uses-material-design: true
